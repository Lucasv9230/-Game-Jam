<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opération sauver la bourse d'or</title>

    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
    <div id="start-screen">
        <div id="logo-container">
            <img id="logo" src="assets/img/logo.png" alt="Logo du jeu">
        </div>
        
        <div id="buttons-container">
            <button id="start-btn" class="btn btn-play">Jouer</button>
            <button id="rules-btn" class="btn btn-rules">Règles du jeu</button>
        </div>
    </div>

    <div id="rules-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Règles du jeu</h2>
            <p>Bienvenue dans le jeu ! Voici les règles :</p>
            <ul>
                <li>Règle 1</li>
                <li>Règle 2</li>
                <li>Règle 3</li>
            </ul>
        </div>
    </div>

    <main id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        

    </main>

    <script src="script.js"></script>

</body>
</html>
